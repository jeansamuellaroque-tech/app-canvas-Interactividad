<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulación de Círculos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark glass">
  <div class="container-fluid">
    <span class="navbar-brand">⚡ Canvas Physics Lab</span>
    <span class="text-light small">Simulación en tiempo real</span>
  </div>
</nav>

<!-- TITULO -->
<div class="container text-center mt-4">
  <h1>Simulación de Círculos</h1>
  <p>Colisiones, interacción y niveles</p>
</div>

<!-- CONTROL -->
<div class="container text-center my-4">
  <label class="form-label">Cantidad de círculos</label>
  <input type="range" class="form-range w-50 mx-auto" id="cantidad" min="1" max="30" value="10">
  <h2 id="valor">10</h2>
</div>

<!-- CANVAS -->
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card glass p-3">
        <h5 class="text-center">Simulación</h5>
        <canvas id="canvas3"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="mt-5 py-3 glass text-center">
  <p><strong>Jean Samuel Laroque</strong></p>
  <p class="small">Ingeniería en Sistemas • 2026</p>
</footer>

<!-- JS -->
<script src="assets/js/main.js"></script>

<!-- SLIDER -->
<script>
const slider = document.getElementById("cantidad");
const valor = document.getElementById("valor");

valor.textContent = slider.value;

slider.addEventListener("input", () => {
  const n = parseInt(slider.value);
  valor.textContent = n;

  createCircles3(n);
});
</script>

</body>
</html>
